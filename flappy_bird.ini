[base]
# Cambiamos el nombre para hacer referencia a tu nuevo entorno
env_name = flappy_bird

[vec]
# 4096 entornos simultáneos consume mucha CPU/Memoria, pero si tienes hardware,
# se puede mantener. Un número estándar inicial suele ser 1024 o 2048.
total_agents = 4096
backend = Serial

[policy]
# Coincide con el tamaño oculto (128) que definiste en: make_puffernet(..., 128, ...)
hidden_size = 128
num_layers = 1

[env]
# CRÍTICO: Debe coincidir con la cantidad de columnas (env->size)
# que espera tu simulador para generar un mapa plano coherente.
size = 32

[train]
total_timesteps = 100_000_000
gamma = 0.99
learning_rate = 0.005
# Asegúrate de que minibatch_size sea menor o igual que (total_agents * unroll_length)
minibatch_size = 32768
ent_coef = 0.01
